<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقابات يونو</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');

:root {
    --gold: #37a0d4;
    --mythic: #c0392b;
    --primary: #4a463f;
    --glass: rgba(255, 255, 255, 0.65);
    --border: rgba(0, 0, 0, 0.08);
    --bg-main: #97d5ff;
    --bg-dark: #a7c7f4;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(180deg, var(--bg-main), var(--bg-dark));
    color: var(--primary);
    min-height: 100vh;
    overflow-x: hidden;
    padding-top: 80px;
    animation: pageEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes pageEnter {
    from { opacity:0; transform:translateY(40px) scale(0.97); filter: blur(8px);}
    to { opacity:1; transform:translateY(0) scale(1); filter: blur(0);}
}

/* ===== NAV ===== */
.nav-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 6%;
    background: rgba(255, 252, 235, 0.85);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(55, 173, 212, 0.35);
}
.menu-item { color: #46565a; text-decoration:none; font-size:14px; font-weight:600; transition:0.3s;}
.menu-item:hover { color: var(--gold); text-shadow:0 0 6px rgba(55, 191, 212, 0.5); }

/* ===== TITLE ===== */
.main-title{
    text-align:center;
    margin:60px auto 40px;
    font-size:32px;
    color:#ddd;
    border-right:5px solid var(--gold);
    padding-right:15px;
    width:fit-content;
    animation: titlePop 1s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes titlePop {
    from { opacity:0; transform: scale(0.8) rotateX(20deg);}
    to { opacity:1; transform: scale(1) rotateX(0);}
}

/* ===== GRID ===== */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
    padding:0 6% 80px;
    perspective: 1200px;
}

/* ===== CARD ===== */
.card{
    position:relative;
    height:260px;
    border-radius:22px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    border:1px solid var(--border);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    transition:0.5s ease;

    /* background fixed */
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.85)),
      var(--bg) no-repeat center/cover;

    opacity:0;
    transform: translateY(60px) scale(0.9);
    transform-style: preserve-3d;
}

.card.show{
    opacity:1;
    transform: translateY(0) scale(1);
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at top, rgba(255,255,255,0.25), transparent 60%);
    opacity:0;
    transition:0.5s;
}

.card:hover::before{ opacity:1; }
.card:hover{ transform: translateY(-15px) rotateX(6deg) rotateY(-6deg) scale(1.03); }
.card:hover h3{ text-shadow:0 0 15px rgba(0, 149, 255, 0.9), 0 0 30px rgba(0, 204, 255, 0.6); }

.card h3{
    font-size:26px;
    margin-bottom:10px;
    color:#37b2d4;
    font-weight:900;
    text-shadow:0 0 10px rgba(55, 170, 212, 0.6), 0 0 20px rgba(55, 183, 212, 0.3);
}

.rank{
    position:absolute;
    top:18px;
    right:18px;
    font-size:11px;
    letter-spacing:2px;
    padding:6px 14px;
    color:#f60202;
    border:1px solid #d92828;
    border-radius:20px;
    background:rgba(40, 10, 10, 0.75);
    backdrop-filter:blur(6px);
    box-shadow:0 0 12px rgba(237, 58, 58, 0.6);
    z-index:2;
}

/* hover glow for mother card */
.mother { border:2px solid var(--gold); box-shadow:0 0 50px rgba(0, 208, 255, 0.6); animation: pulseGlow 3s infinite;}
@keyframes pulseGlow {
    0% { box-shadow:0 0 20px rgba(0, 166, 255, 0.3);}
    50% { box-shadow:0 0 60px rgba(0, 191, 255, 0.75);}
    100% { box-shadow:0 0 20px rgba(0, 166, 255, 0.3);}
}

/* ===== Falling Icons ===== */
.falling-icons{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:-1;
    overflow:hidden;
}
.falling-icons span{
    position:absolute;
    font-size:18px;
    opacity:0.6;
    animation:fall linear infinite;
}
@keyframes fall {
    0% { transform:translateY(-50px) rotate(0deg); opacity:0; }
    10% { opacity:1; }
    100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
}

/* ===== Developer Badge ===== */
.developer-badge {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 242, 254, 0.2);
    padding: 8px 15px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 9999;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.developer-badge:hover{
    transform: translateY(-5px) scale(1.05);
    border-color:#00f2fe;
    box-shadow:0 5px 15px rgba(0,242,254,0.2);
    background: rgba(15,23,42,0.9);
}
.developer-badge .text { font-size:11px; color:#fff; font-weight:bold; letter-spacing:1.5px; font-family:'Cinzel', serif;}
.developer-badge .code-icon { color:#00f2fe; font-weight:900; font-family:monospace; font-size:14px; animation: blink 2s infinite;}

/* Hover glow أقوى */
.card:hover {
    transform: translateY(-18px) rotateX(6deg) rotateY(-6deg) scale(1.05);
    box-shadow: 0 0 60px rgba(0, 255, 229, 0.8), 0 10px 30px rgba(0, 179, 255, 0.5);
}

/* Click effect - shadow dynamic */
.card.active-click {
    animation: clickGlow 0.35s forwards;
}

@keyframes clickGlow {
    0% {
        box-shadow: 0 0 60px rgba(0, 234, 255, 0.8), 0 10px 30px rgba(0, 200, 255, 0.5);
        transform: translateY(-18px) rotateX(6deg) rotateY(-6deg) scale(1.05);
    }
    50% {
        box-shadow: 0 0 100px rgb(0, 200, 255), 0 15px 50px rgba(0, 238, 255, 0.7);
        transform: translateY(-20px) rotateX(8deg) rotateY(-8deg) scale(1.08);
    }
    100% {
       box-shadow: 0 0 60px rgba(0, 234, 255, 0.8), 0 10px 30px rgba(0, 200, 255, 0.5);
        transform: translateY(-18px) rotateX(6deg) rotateY(-6deg) scale(1.05);
    }
}
.developer-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            /* يمكنك تغييرها إلى right إذا أردت */
            background: rgba(15, 23, 42, 0.6);
            /* زجاجي داكن */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 8px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-decoration: none;
        }

        .developer-badge:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: #00f2fe;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
            background: rgba(15, 23, 42, 0.9);
        }

        .developer-badge .text {
            font-family: 'Cinzel', serif;
            /* أو أي خط تفضله */
            font-size: 11px;
            color: #fff;
            letter-spacing: 1.5px;
            font-weight: bold;
        }

        .developer-badge .code-icon {
            color: #00f2fe;
            font-weight: 900;
            font-family: monospace;
            font-size: 14px;
            animation: blink 2s infinite;
        }

</style>
</head>
<body>
    <nav class="nav-container">
    <div style="font-weight:900;">SILANCE ❄️</div>
    <a href="index.html" class="menu-item">رجوع إلى المملكة</a>
</nav>

<h2 class="main-title">نقابات يونو</h2>

<div class="cards">
     <div class="card" style="--bg:url('./irin.jfif')">
        <span class="rank">ايـࢪيـن🩸</span>
        <h3>الـديـا</h3>
        <span class="icon">🪽</span>
    </div>
    <div class="card" style="--bg:url('./yami.jfif')">
        <span class="rank">يـامـي ⛩️</span>
        <h3>مـون</h3>
        <span class="icon">🌕</span>
    </div>
</div>
<a href="#" class="developer-badge">
            <span class="text"> 𝑲𝒂𝒊𝒓𝒐 – 𝑻𝒐𝒋𝒊 ⛧</span>
            <span class="code-icon">&lt;/&gt;</span>
        </a>

    <script>
/* ===== Card click shake ===== */
document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
        card.classList.add("shake");
        setTimeout(() => card.classList.remove("shake"), 350);
    });
});

/* ===== Mouse rotate ===== */
document.addEventListener("mousemove", e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * -10;

    document.querySelectorAll(".card").forEach(card => {
        card.style.transform = `translateY(0) rotateY(${x}deg) rotateX(${y}deg)`;
    });
});

/* ===== Show all cards ===== */
document.querySelectorAll('.card').forEach(card => card.classList.add('show'));

/* ===== Falling icons ===== */
const container = document.getElementById("fallingIcons");
const count = 40;

for(let i=0;i<count;i++){
    const icon = document.createElement("span");
    icon.textContent = icons[Math.floor(Math.random()*icons.length)];
    icon.style.left = Math.random()*100 + "vw";
    icon.style.animationDuration = (Math.random()*5+5)+"s";
    icon.style.fontSize = (Math.random()*24+14)+"px";
    container.appendChild(icon);
}
document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
        card.classList.add("active-click");
        setTimeout(() => card.classList.remove("active-click"), 350);
    });
});

</script>
</body>
</html>
